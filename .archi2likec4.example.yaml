# archi2likec4 configuration
# Copy to .archi2likec4.yaml and customise for your landscape.
#
# Every key is optional — unset keys fall back to built-in defaults
# from archi2likec4/config.py.

# ── Subsystem promotion ───────────────────────────────────────────────
# Parents whose dot-children should become standalone systems.
# Format: parent_name: fallback_domain
promote_children:
  CRM: products
  PaymentGateway: payments

# Warn about parents with >= this many subsystems not listed above
promote_warn_threshold: 10

# ── Domain rebranding ─────────────────────────────────────────────────
# Rename domains discovered from functional_areas views.
# Format: old_c4_id: [new_c4_id, "Display Name"]
domain_renames:
  core_banking_ops: [products, "Products"]
  client_service_mgmt: [customer_service, "Customer Service"]

# ── Extra domain patterns ────────────────────────────────────────────
# Systems not on any functional_areas view are assigned to a domain
# by substring-matching their name against these patterns.
extra_domain_patterns:
  - c4_id: external_exchange
    name: "External Exchange"
    patterns:
      - PaymentNetwork
      - GovPortal
      - InsuranceHub
      - CardScheme
      - RemittanceProvider
      - OpenBanking
  - c4_id: platform
    name: Platform
    patterns:
      - ELK
      - Grafana
      - HA Proxy
      - Hadoop
      - ESB
      - MQ
      - Kubernetes
      - MongoDB
      - Oracle
      - Postgres
      - Prometheus
      - RabbitMQ
      - SFTP
      - SMS Gateway
      - SMTP Server
      - WAF
      - Zipkin
      - Confluence
      - Jira
      - API Gateway

# ── Quality gates ─────────────────────────────────────────────────────
quality_gates:
  # Fail if more than this fraction of solution-view elements is unresolved
  max_unresolved_ratio: 0.5
  # Warn if orphan function count exceeds threshold
  max_orphan_functions_warn: 5
  # Warn if unassigned-domain system count exceeds threshold
  max_unassigned_systems_warn: 20

# ── Audit suppress-list ──────────────────────────────────────────────
# Systems to exclude from AUDIT.md (accepted risks).
# Listed systems will not appear in any QA incident table.
# audit_suppress:
#   - LegacySystem
#   - DeprecatedApp

# Suppress entire incident categories by QA-ID.
# audit_suppress_incidents:
#   - QA-5
#   - QA-6

# ── Domain overrides ────────────────────────────────────────────────
# Manually assign systems to domains (highest priority, overrides view membership).
# Format: system_name: domain_c4_id
# domain_overrides:
#   DirectoryService: platform
#   LegacyApp: products

# ── Subdomain overrides ─────────────────────────────────────────────
# Manually assign systems to subdomains (overrides folder-based auto-detection).
# Format: system_name: subdomain_c4_id
# The subdomain must exist within the system's assigned domain.
# subdomain_overrides:
#   PaymentCore: payments
#   ReportingApp: analytics

# ── Reviewed systems ──────────────────────────────────────────────
# Systems reviewed externally — strip the to_review tag during build.
# reviewed_systems:
#   - OldSystem
#   - MigratedApp

# ── Behaviour flags ───────────────────────────────────────────────────
# Treat quality-gate warnings as errors (exit 1)
strict: false

# ── Metadata mapping ──────────────────────────────────────────────────
# Map ArchiMate property names to LikeC4 metadata keys.
# Entries here ADD to (or override) the built-in defaults.
# property_map:
#   "My Custom Property": my_custom_key
#   "Owner": owner

# Keys that count as "filled" when checking QA-2 (empty card) incidents.
# standard_keys:
#   - ci
#   - full_name
#   - criticality

# ── Auto-sync target ──────────────────────────────────────────────────
# After a successful generation, copy output_dir into this directory.
# Useful to keep a companion repo (e.g. asaka-architecture) in sync
# without a manual copy step.
#
# Can also be set per-run with --sync-target on the CLI (overrides YAML).
# sync_target: /path/to/your/companion-repo

# Paths at the top level of the sync target that are NEVER overwritten.
# Extends the built-in protected list (.gitignore, README.md, etc.).
# sync_protected_top:
#   - AGENTS.md
#   - adr/

# Nested paths inside the sync target that are NEVER overwritten.
# sync_protected_paths:
#   - scripts/.gitkeep
#   - scripts/validate_domains.py

# ── Extra view-name patterns ──────────────────────────────────────────
# Additional regex patterns for solution-view name matching.
# Useful for locale-specific view naming (e.g., Russian).
# Format: pattern: <regex>, view_type: functional|integration|deployment
#
# These extend the built-in English patterns.
# extra_view_patterns:
#   - pattern: '^Функциональная архитектура[.\s]+(.+)$'
#     view_type: functional
#   - pattern: '^Интеграционная архитектура[.\s]+(.+)$'
#     view_type: integration
#   - pattern: '^Схема разв[её]ртывания[.\s]+(.+)$'
#     view_type: deployment

# ── Specification: colors, shapes, tags ───────────────────────────────
# Customize appearance of LikeC4 elements in the generated spec.
# All keys are optional — unset keys fall back to built-in defaults.
#
