[project]
name = "archi2likec4"
version = "0.6.0"
description = "Convert coArchi XML (ArchiMate) to LikeC4 .c4 files"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "archi2likec4 contributors"}]
keywords = ["archimate", "likec4", "coarchi", "architecture", "converter"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Topic :: Software Development :: Documentation",
]
dependencies = []

[project.optional-dependencies]
federation = ["pyyaml>=6.0"]
dev = ["pytest>=7.0"]

[project.scripts]
archi2likec4 = "archi2likec4.pipeline:main"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.packages.find]
include = ["archi2likec4*"]
