name: Publish to PyPI

on:
  release:
    types: [released]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Version consistency check
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -c "
          import tomllib, os
          v = tomllib.load(open('pyproject.toml', 'rb'))['project']['version']
          tag = os.environ['RELEASE_TAG']
          assert f'v{v}' == tag, f'Tag mismatch: v{v} != {tag}'
          print(f'Version check passed: v{v} == {tag}')
          "
      - run: pip install build
      - run: python -m build
      - name: Verify package
        run: pip install twine && twine check dist/*
      - name: Install and smoke-test
        run: pip install dist/*.whl && archi2likec4 --version
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1

  update-homebrew:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: Lenivvenil/homebrew-archi2likec4
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Compute version and SHA256 of sdist
        id: meta
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          URL="https://files.pythonhosted.org/packages/source/a/archi2likec4/archi2likec4-${VERSION}.tar.gz"
          # Retry up to 5 times — PyPI propagation may lag a few seconds
          SHA256=""
          for i in 1 2 3 4 5; do
            SHA256=$(curl -fsSL "$URL" 2>/dev/null | shasum -a 256 | cut -d' ' -f1) || true
            # Reject the SHA256 of empty input (curl returned nothing)
            [ -n "$SHA256" ] && [ "$SHA256" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ] && break
            SHA256=""
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          [ -n "$SHA256" ] || { echo "ERROR: Failed to download $URL after 5 attempts"; exit 1; }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Update Formula
        run: |
          set -e
          VERSION="${{ steps.meta.outputs.version }}"
          SHA256="${{ steps.meta.outputs.sha256 }}"
          URL="${{ steps.meta.outputs.url }}"
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/archi2likec4.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/archi2likec4.rb
          grep -q "archi2likec4-${VERSION}.tar.gz" Formula/archi2likec4.rb \
            || { echo "ERROR: url pattern not updated in Formula"; exit 1; }
          grep -q "${SHA256}" Formula/archi2likec4.rb \
            || { echo "ERROR: sha256 pattern not updated in Formula"; exit 1; }

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && { echo "ERROR: Formula unchanged after sed — aborting"; exit 1; }
          git commit -am "archi2likec4 ${{ steps.meta.outputs.version }}"
          git push
